<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Claims Jose Christoper - Resume">
    <title>Resume | Claims Jose Christoper</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        .resume-container {
            min-height: 100vh;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
        }

        .resume-header {
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(16px);
            padding: 2rem 4rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .resume-title-section {
            flex: 1;
        }

        .resume-terminal {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-color);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .resume-title-section h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .resume-title-section p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin: 0.5rem 0 0 0;
        }

        .resume-actions {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .resume-actions a {
            color: var(--text-secondary);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s;
            cursor: pointer;
        }

        .resume-actions a:hover {
            color: var(--accent-color);
        }

        .resume-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 4rem;
        }

        .resume-frame {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 8.5 / 11;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #fff;
        }

        .resume-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .resume-info {
            background: rgba(0,255,136,0.05);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            text-align: center;
        }

        .resume-info p {
            color: var(--text-secondary);
            margin: 0;
            font-size: 0.95rem;
            flex: 1;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .resume-header {
                padding: 1.5rem 2rem;
            }
            .resume-content {
                padding: 1.5rem 2rem;
            }
        }

        @media (max-width: 768px) {
            .resume-header {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
                padding: 1.5rem 1rem;
            }

            .resume-title-section h1 {
                font-size: 1.8rem;
            }

            .resume-actions {
                justify-content: center;
                width: 100%;
            }

            .resume-content {
                padding: 1rem;
            }

            .resume-frame {
                max-width: 100%;
                aspect-ratio: auto;
                min-height: 500px;
            }
        }

        @media (max-width: 480px) {
            .resume-header {
                padding: 1rem;
            }

            .resume-title-section h1 {
                font-size: 1.4rem;
            }

            .resume-terminal {
                font-size: 0.75rem;
            }

            .resume-actions {
                flex-direction: column;
                gap: 0.75rem;
                width: 100%;
            }

            .resume-actions a {
                font-size: 0.9rem;
                padding: 0.5rem 1rem;
                display: block;
                text-align: center;
            }

            .resume-content {
                padding: 0.5rem;
            }

            .resume-frame {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="background-effects" id="bg-effects">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="resume-container">
        <!-- Header -->
        <div class="resume-header">
            <div class="resume-title-section">
                <div class="resume-terminal">root@system:~/resume</div>
                <h1>Claims Jose Christoper</h1>
                <p>Your resume in PDF format - view it directly without any authentication required.</p>
            </div>
            <div class="resume-actions">
                <a href="index.html">Back Home</a>
                <a href="resume.pdf" download="Claims_Jose_Christoper_Resume.pdf">Download PDF</a>
            </div>
        </div>

        <!-- Content -->
        <div class="resume-content">
            <div style="width: 100%; max-width: 900px;">
                <div class="resume-info">
                    <span style="font-size: 1.5rem;">✅</span>
                    <p>Your resume PDF is loaded and ready to view. No sign-in required. You can also download it using the button above.</p>
                </div>
                <div class="resume-frame">
                    <embed 
                        src="resume.pdf" 
                        type="application/pdf" 
                        style="width: 100%; height: 100%;"
                    />
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
